<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>정유찬</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f5;
            color: #333;
            font-family: sans-serif;
            padding: 20px;
        }

        .main-container {
            display: grid;
            grid-template-areas:
                "header header"
                "sidebar content";
            grid-template-columns: 200px 1fr;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            grid-area: header;
            background: white;
            border: 2px solid #333;
            padding: 20px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
        }

        .sidebar {
            grid-area: sidebar;
            background: white;
            border: 2px solid #333;
            padding: 0;
        }

        .sidebar-item {
            border-bottom: 1px solid #ccc;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
        }

        .sidebar-item:last-child {
            border-bottom: none;
        }

        .content {
            grid-area: content;
            background: white;
            border: 2px solid #333;
            padding: 0;
        }

        .top-section {
            display: flex;
            border-bottom: 2px solid #333;
        }

        .profile-image {
            width: 45%;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 2px solid #333;
            background: #f9f9f9;
        }

        .profile-image img {
            max-width: 100%;
            max-height: 300px;
            height: auto;
        }

        .profile-name {
            width: 55%;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            background: #f9f9f9;
        }

        .info-section {
            display: grid;
            grid-template-columns: 100px 1fr;
        }

        .info-row {
            display: contents;
        }

        .info-key {
            background: #e8e8e8;
            border-right: 1px solid #ccc;
            border-bottom: 1px solid #ccc;
            padding: 12px;
            font-weight: bold;
            text-align: center;
            font-size: 13px;
        }

        .info-value {
            border-bottom: 1px solid #ccc;
            padding: 12px;
            font-size: 13px;
        }

        .game-section {
            margin-top: 40px;
            padding: 20px;
            background: white;
            border: 2px solid #333;
            text-align: center;
        }

        .game-section h2 {
            margin-bottom: 15px;
            font-size: 20px;
        }

        #gameCanvas {
            border: 2px solid #333;
            display: block;
            margin: 0 auto;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            cursor: none;
        }

        .game-info {
            margin-top: 10px;
            font-size: 14px;
        }

        .score {
            font-weight: bold;
            color: #333;
        }

        .instructions {
            margin-top: 15px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">정유찬</div>

        <div class="sidebar">
            <div class="sidebar-item">출생</div>
            <div class="sidebar-item">국적</div>
            <div class="sidebar-item">본관</div>
            <div class="sidebar-item">신체</div>
            <div class="sidebar-item">MBTI</div>
            <div class="sidebar-item">가족</div>
        </div>

        <div class="content">
            <div class="top-section">
                <div class="profile-image">
                    <img src="brave_cookie.png" alt="정유찬">
                </div>
                <div class="profile-name">정유찬</div>
            </div>

            <div class="info-section">
                <div class="info-row">
                    <div class="info-key">출생</div>
                    <div class="info-value">2014년 10월 9일</div>
                </div>
                <div class="info-row">
                    <div class="info-key">국적</div>
                    <div class="info-value">대한민국</div>
                </div>
                <div class="info-row">
                    <div class="info-key">본관</div>
                    <div class="info-value">진주정씨</div>
                </div>
                <div class="info-row">
                    <div class="info-key">신체</div>
                    <div class="info-value">150cm, 36kg</div>
                </div>
                <div class="info-row">
                    <div class="info-key">MBTI</div>
                    <div class="info-value">ENFJ</div>
                </div>
                <div class="info-row">
                    <div class="info-key">가족</div>
                    <div class="info-value">아빠(정종훈), 엄마(허현미), 누나(정하윤)</div>
                </div>
            </div>
        </div>
    </div>

    <div class="game-section">
        <h2>🎈 열기구 게임</h2>
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        <div class="game-info">
            <span class="score">점수: <span id="score">0</span></span>
        </div>
        <div class="instructions">
            마우스를 움직여 열기구를 조종하세요 | 떨어지는 물건을 피하세요!
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');

        let balloonX = canvas.width / 2;
        const balloonY = canvas.height - 60;
        const balloonRadius = 20;

        let mouseX = canvas.width / 2;
        let score = 0;
        let gameRunning = true;

        const obstacles = [];
        const particles = [];

        class Obstacle {
            constructor() {
                this.x = Math.random() * (canvas.width - 40) + 20;
                this.y = -30;
                this.width = 30;
                this.height = 30;
                this.speed = 2 + Math.random() * 2;
                this.type = Math.random() > 0.7 ? 'bad' : 'good';
            }

            update() {
                this.y += this.speed;
            }

            draw() {
                if (this.type === 'good') {
                    ctx.fillStyle = '#FFD700';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                    ctx.fillStyle = '#FFA500';
                    ctx.font = 'bold 16px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('$', this.x + 15, this.y + 22);
                } else {
                    ctx.fillStyle = '#FF6B6B';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                    ctx.fillStyle = '#000';
                    ctx.font = 'bold 16px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('X', this.x + 15, this.y + 22);
                }
            }

            isOffscreen() {
                return this.y > canvas.height;
            }

            collidesWith(x, y, radius) {
                return x + radius > this.x &&
                       x - radius < this.x + this.width &&
                       y + radius > this.y &&
                       y - radius < this.y + this.height;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = Math.random() * -3 - 1;
                this.life = 30;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1;
                this.life--;
            }

            draw() {
                ctx.globalAlpha = this.life / 30;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function drawBalloon(x, y) {
            ctx.fillStyle = '#FF6B9D';
            ctx.beginPath();
            ctx.arc(x, y, balloonRadius, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.strokeStyle = '#666';
            ctx.lineWidth = 1;
            for (let i = 0; i < 4; i++) {
                const angle = (i / 4) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(
                    x + Math.cos(angle) * balloonRadius,
                    y + Math.sin(angle) * balloonRadius
                );
                ctx.stroke();
            }

            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x - 8, y + balloonRadius, 16, 20);
        }

        function update() {
            balloonX += (mouseX - balloonX) * 0.9;
            balloonX = Math.max(balloonRadius, Math.min(canvas.width - balloonRadius, balloonX));

            if (Math.random() < 0.02) {
                obstacles.push(new Obstacle());
            }

            obstacles.forEach((obstacle, index) => {
                obstacle.update();

                if (obstacle.collidesWith(balloonX, balloonY, balloonRadius)) {
                    if (obstacle.type === 'good') {
                        score += 10;
                        for (let i = 0; i < 5; i++) {
                            particles.push(new Particle(obstacle.x + 15, obstacle.y + 15, '#FFD700'));
                        }
                    } else {
                        gameRunning = false;
                    }
                    obstacles.splice(index, 1);
                }

                if (obstacle.isOffscreen()) {
                    obstacles.splice(index, 1);
                }
            });

            particles.forEach((particle, index) => {
                particle.update();
                if (particle.life <= 0) {
                    particles.splice(index, 1);
                }
            });

            scoreDisplay.textContent = score;
        }

        function draw() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'rgba(135, 206, 235, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            obstacles.forEach(obstacle => obstacle.draw());
            particles.forEach(particle => particle.draw());
            drawBalloon(balloonX, balloonY);

            if (!gameRunning) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('게임 오버!', canvas.width / 2, canvas.height / 2 - 30);
                ctx.font = '24px Arial';
                ctx.fillText(`최종 점수: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
                ctx.font = '16px Arial';
                ctx.fillText('새로고침으로 다시 시작하세요', canvas.width / 2, canvas.height / 2 + 60);
            }
        }

        function gameLoop() {
            if (gameRunning) {
                update();
            }
            draw();
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
        });

        gameLoop();
    </script>
</body>
</html>
