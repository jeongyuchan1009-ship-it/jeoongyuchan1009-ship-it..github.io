<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>정유찬</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f5;
            color: #333;
            font-family: sans-serif;
            padding: 20px;
        }

        .main-container {
            display: grid;
            grid-template-areas:
                "header header"
                "sidebar content";
            grid-template-columns: 200px 1fr;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            grid-area: header;
            background: white;
            border: 2px solid #333;
            padding: 20px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
        }

        .sidebar {
            grid-area: sidebar;
            background: white;
            border: 2px solid #333;
            padding: 0;
        }

        .sidebar-item {
            border-bottom: 1px solid #ccc;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
        }

        .sidebar-item:last-child {
            border-bottom: none;
        }

        .content {
            grid-area: content;
            background: white;
            border: 2px solid #333;
            padding: 0;
        }

        .top-section {
            display: flex;
            border-bottom: 2px solid #333;
        }

        .profile-image {
            width: 45%;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 2px solid #333;
            background: #f9f9f9;
        }

        .profile-image img {
            max-width: 100%;
            max-height: 300px;
            height: auto;
        }

        .profile-name {
            width: 55%;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            background: #f9f9f9;
        }

        .info-section {
            display: grid;
            grid-template-columns: 100px 1fr;
        }

        .info-row {
            display: contents;
        }

        .info-key {
            background: #e8e8e8;
            border-right: 1px solid #ccc;
            border-bottom: 1px solid #ccc;
            padding: 12px;
            font-weight: bold;
            text-align: center;
            font-size: 13px;
        }

        .info-value {
            border-bottom: 1px solid #ccc;
            padding: 12px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">정유찬</div>

        <div class="sidebar">
            <div class="sidebar-item">출생</div>
            <div class="sidebar-item">국적</div>
            <div class="sidebar-item">본관</div>
            <div class="sidebar-item">신체</div>
            <div class="sidebar-item">MBTI</div>
            <div class="sidebar-item">가족</div>
        </div>

        <div class="content">
            <div class="top-section">
                <div class="profile-image">
                    <img src="brave_cookie.png.png" alt="정유찬">
                </div>
                <div class="profile-name">정유찬</div>
            </div>

            <div class="info-section">
                <div class="info-row">
                    <div class="info-key">출생</div>
                    <div class="info-value">2014년 10월 9일</div>
                </div>
                <div class="info-row">
                    <div class="info-key">국적</div>
                    <div class="info-value">대한민국</div>
                </div>
                <div class="info-row">
                    <div class="info-key">본관</div>
                    <div class="info-value">진주정씨</div>
                </div>
                <div class="info-row">
                    <div class="info-key">신체</div>
                    <div class="info-value">150cm, 36kg</div>
                </div>
                <div class="info-row">
                    <div class="info-key">MBTI</div>
                    <div class="info-value">ENFJ</div>
                </div>
                <div class="info-row">
                    <div class="info-key">가족</div>
                    <div class="info-value">아빠(정종훈), 엄마(허현미), 누나(정하윤)</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
